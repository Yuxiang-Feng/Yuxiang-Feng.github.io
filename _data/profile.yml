short_bio_text_justify: false
short_bio: >-
  <p>
    Hi, my name is Yuxiang Feng, welcome to my homepage! I received my master's degree in Applied Mathematics 
    from Northwestern University, and I was fortunate to be advised by <a href="http://www.niallmangan.com/" target="_blank">Prof. Niall Mangan</a> and <a href="https://mjayadharan.github.io/" target="_blank">Dr. Manu Jayadharan</a>. 
    Before that, I received my bachelor's degree in Information and Computational Science from China University of Mining and Technology (Beijing), 
    and I was a research assistant at Chinese Academy of Environmental Planning, where I was under the supervision of <a href="https://www.linkedin.com/in/%E6%99%93%E5%A7%9D-%E4%BE%AF-04ab0911a/" target="_blank">Dr. Xiaoshu Hou</a>.
  </p>
  <p>
    My research interests include mathematical modeling, data-driven modeling, and machine learning, with applications in complex systems and computational biology. I'm also interested in the intersection of these fields with environmental and ecological science.
    Feel free to reach out for discussions and collaborations!
  </p>

